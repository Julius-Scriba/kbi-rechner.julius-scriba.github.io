<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KbI-Rechner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23d97706'/><text x='50' y='65' font-size='40' text-anchor='middle' fill='white' font-weight='bold'>€</text></svg>">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com?v=3"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body, #root {
      width: 100%;
      height: 100%;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .trash-icon {
      transition: all 0.2s;
    }
    
    .trash-icon:hover {
      transform: scale(1.1);
      color: #d97706;
    }
    
    .tab-container {
      transition: transform 0.3s ease;
    }
    
    .swipe-hint {
      position: absolute;
      right: 12px;
      bottom: 12px;
      color: rgba(0,0,0,0.2);
      font-size: 12px;
      pointer-events: none;
    }
    
    .pdf-button {
      background: linear-gradient(to right, #1e40af, #1d4ed8);
      box-shadow: 0 4px 6px -1px rgba(23, 43, 77, 0.1);
      transition: all 0.2s;
    }
    
    .pdf-button:hover {
      background: linear-gradient(to right, #1e3a8a, #1d4ed8);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px -1px rgba(23, 43, 77, 0.2);
    }
    
    .pdf-button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    function App() {
      const coins = [
        { id: '2e', label: '2 Euro', value: 2.00, weight: 8.50 },
        { id: '1e', label: '1 Euro', value: 1.00, weight: 7.50 },
        { id: '50c', label: '50 Cent', value: 0.50, weight: 7.80 },
        { id: '20c', label: '20 Cent', value: 0.20, weight: 5.74 },
        { id: '10c', label: '10 Cent', value: 0.10, weight: 4.10 },
        { id: '5c', label: '5 Cent', value: 0.05, weight: 3.92 },
        { id: '2c', label: '2 Cent', value: 0.02, weight: 3.06 },
        { id: '1c', label: '1 Cent', value: 0.01, weight: 2.30 },
      ];

      const banknotes = [
        { id: '500', label: '500 Euro', value: 500 },
        { id: '200', label: '200 Euro', value: 200 },
        { id: '100', label: '100 Euro', value: 100 },
        { id: '50', label: '50 Euro', value: 50 },
        { id: '20', label: '20 Euro', value: 20 },
        { id: '10', label: '10 Euro', value: 10 },
        { id: '5', label: '5 Euro', value: 5 },
      ];

      const [activeTab, setActiveTab] = useState('coins');
      const [touchStart, setTouchStart] = useState(null);
      const [touchEnd, setTouchEnd] = useState(null);
      const [selectedCoinId, setSelectedCoinId] = useState('2e');
      const [totalWeight, setTotalWeight] = useState('');
      const [tareWeight, setTareWeight] = useState('34');
      const [selectedBanknoteId, setSelectedBanknoteId] = useState('50');
      const [numBanknotes, setNumBanknotes] = useState('');
      const [entries, setEntries] = useState([]);

      // Coins calculation
      const total = parseFloat(totalWeight) || 0;
      const tare = parseFloat(tareWeight) || 0;
      const netWeight = total - tare;
      
      let resultText = '';
      let isValid = true;
      let numCoins = 0;
      let totalValue = 0;

      if (totalWeight !== '' && tareWeight !== '') {
        if (netWeight <= 0) {
          resultText = 'Nettogewicht muss positiv sein';
          isValid = false;
        } else {
          const selectedCoin = coins.find(coin => coin.id === selectedCoinId);
          if (selectedCoin) {
            numCoins = Math.round(netWeight / selectedCoin.weight);
            totalValue = numCoins * selectedCoin.value;
            resultText = `${numCoins} Münzen = ${totalValue.toFixed(2)} €`;
          }
        }
      } else {
        resultText = 'Gewicht eingeben';
        isValid = false;
      }

      // Banknotes calculation
      let banknoteResultText = '';
      let banknoteIsValid = true;
      let banknoteTotalValue = 0;
      let banknoteNum = parseInt(numBanknotes) || 0;

      if (numBanknotes !== '') {
        if (banknoteNum <= 0) {
          banknoteResultText = 'Anzahl muss positiv sein';
          banknoteIsValid = false;
        } else {
          const selectedNote = banknotes.find(note => note.id === selectedBanknoteId);
          if (selectedNote) {
            banknoteTotalValue = banknoteNum * selectedNote.value;
            banknoteResultText = `${banknoteNum} Scheine = ${banknoteTotalValue.toFixed(2)} €`;
          }
        }
      } else {
        banknoteResultText = 'Anzahl eingeben';
        banknoteIsValid = false;
      }

      const handleAddResult = useCallback(() => {
        if (!isValid) return;
        
        const selectedCoin = coins.find(coin => coin.id === selectedCoinId);
        if (selectedCoin) {
          setEntries(prev => [...prev, {
            id: Date.now(),
            coinLabel: selectedCoin.label,
            numCoins,
            totalValue
          }]);
          
          setTotalWeight('');
          const currentIndex = coins.findIndex(coin => coin.id === selectedCoinId);
          if (currentIndex < coins.length - 1) {
            setSelectedCoinId(coins[currentIndex + 1].id);
          }
        }
      }, [isValid, selectedCoinId, numCoins, totalValue, coins]);

      const handleAddBanknote = useCallback(() => {
        if (!banknoteIsValid) return;
        
        const selectedNote = banknotes.find(note => note.id === selectedBanknoteId);
        if (selectedNote) {
          setEntries(prev => [...prev, {
            id: Date.now(),
            coinLabel: selectedNote.label,
            numCoins: banknoteNum,
            totalValue: banknoteTotalValue
          }]);
          
          setNumBanknotes('');
          const currentIndex = banknotes.findIndex(note => note.id === selectedBanknoteId);
          if (currentIndex < banknotes.length - 1) {
            setSelectedBanknoteId(banknotes[currentIndex + 1].id);
          }
        }
      }, [banknoteIsValid, selectedBanknoteId, banknoteNum, banknoteTotalValue, banknotes]);

      const handleDelete = useCallback((id) => {
        setEntries(prev => prev.filter(entry => entry.id !== id));
      }, []);

      const totalAmount = entries.reduce((sum, entry) => sum + entry.totalValue, 0);

      // Touch handlers for swipe
      const handleTouchStart = (e) => {
        setTouchStart(e.touches[0].clientX);
        setTouchEnd(null);
      };

      const handleTouchMove = (e) => {
        setTouchEnd(e.touches[0].clientX);
      };

      const handleTouchEnd = useCallback(() => {
        if (!touchStart || !touchEnd) return;
        
        const distance = touchStart - touchEnd;
        const isLeftSwipe = distance > 50;
        const isRightSwipe = distance < -50;
        
        if (isLeftSwipe && activeTab === 'coins') {
          setActiveTab('banknotes');
        }
        if (isRightSwipe && activeTab === 'banknotes') {
          setActiveTab('coins');
        }
      }, [touchStart, touchEnd, activeTab]);

      const exportToPDF = useCallback(() => {
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          
          const pageWidth = doc.internal.pageSize.getWidth();
          const margin = 15;
          const col1 = margin + 5;
          const col2 = 80;
          const col3 = 120;
          const col4 = 160;
          const lineHeight = 8;
          
          const aggregatedCoins = {};
          const aggregatedBanknotes = {};
          
          coins.forEach(coin => {
            aggregatedCoins[coin.id] = {
              label: coin.label,
              count: 0,
              totalValue: 0,
              weight: coin.weight
            };
          });
          
          banknotes.forEach(note => {
            aggregatedBanknotes[note.id] = {
              label: note.label,
              count: 0,
              totalValue: 0,
              value: note.value
            };
          });
          
          entries.forEach(entry => {
            const isCoin = coins.some(coin => coin.label === entry.coinLabel);
            
            if (isCoin) {
              const coin = coins.find(coin => coin.label === entry.coinLabel);
              if (coin) {
                aggregatedCoins[coin.id].count += entry.numCoins;
                aggregatedCoins[coin.id].totalValue += entry.totalValue;
              }
            } else {
              const note = banknotes.find(note => note.label === entry.coinLabel);
              if (note) {
                aggregatedBanknotes[note.id].count += entry.numCoins;
                aggregatedBanknotes[note.id].totalValue += entry.totalValue;
              }
            }
          });
          
          const sortedCoins = coins.map(coin => aggregatedCoins[coin.id]);
          const sortedBanknotes = banknotes.map(note => aggregatedBanknotes[note.id]);
          
          // Header
          doc.setFillColor(250, 214, 165);
          doc.rect(0, 0, pageWidth, 40, 'F');
          
          doc.setFontSize(24);
          doc.setTextColor(217, 119, 6);
          doc.text('€', 20, 25);
          
          doc.setFontSize(22);
          doc.setTextColor(124, 77, 26);
          doc.setFont('helvetica', 'bold');
          doc.text('KbI-Rechner', pageWidth / 2, 20, { align: 'center' });
          
          doc.setFontSize(16);
          doc.setTextColor(156, 117, 79);
          doc.setFont('helvetica', 'normal');
          doc.text('Zusammenfassung der gesammelten Werte', pageWidth / 2, 32, { align: 'center' });
          
          const today = new Date();
          const dateStr = `${today.getDate().toString().padStart(2, '0')}.${(today.getMonth()+1).toString().padStart(2, '0')}.${today.getFullYear()}`;
          doc.setFontSize(12);
          doc.setTextColor(100, 100, 100);
          doc.text(`Erstellt am: ${dateStr}`, pageWidth - margin, 45, { align: 'right' });
          
          let yPosition = 55;
          
          // Coins section
          doc.setFontSize(14);
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(124, 77, 26);
          doc.text('MÜNZEN', pageWidth / 2, yPosition, { align: 'center' });
          
          yPosition += 8;
          doc.setDrawColor(230, 210, 180);
          doc.setLineWidth(0.5);
          doc.line(margin, yPosition, pageWidth - margin, yPosition);
          
          yPosition += 10;
          doc.setFillColor(255, 240, 220);
          doc.rect(margin, yPosition - 8, pageWidth - 2 * margin, 10, 'F');
          
          doc.setFontSize(12);
          doc.setTextColor(124, 77, 26);
          doc.setFont('helvetica', 'bold');
          doc.text('Position', col1, yPosition);
          doc.text('Anzahl', col2, yPosition, { align: 'right' });
          doc.text('Wert pro Stück', col3, yPosition, { align: 'right' });
          doc.text('Gesamtwert', col4, yPosition, { align: 'right' });
          
          yPosition += 5;
          doc.setDrawColor(230, 210, 180);
          doc.line(margin, yPosition, pageWidth - margin, yPosition);
          
          yPosition += 12;
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(50, 50, 50);
          
          sortedCoins.forEach(coin => {
            if (yPosition > 265) {
              doc.addPage();
              yPosition = 30;
            }
            
            doc.setFontSize(11);
            doc.text(coin.label, col1, yPosition);
            doc.text(coin.count.toString(), col2, yPosition, { align: 'right' });
            const valuePerItem = (coin.totalValue / (coin.count > 0 ? coin.count : 1)).toFixed(2);
            doc.text(`${valuePerItem} €`, col3, yPosition, { align: 'right' });
            doc.text(`${coin.totalValue.toFixed(2)} €`, col4, yPosition, { align: 'right' });
            yPosition += lineHeight + 2;
          });
          
          yPosition += 10;
          
          // Banknotes section
          doc.setFontSize(14);
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(124, 77, 26);
          doc.text('SCHEINE', pageWidth / 2, yPosition, { align: 'center' });
          
          yPosition += 8;
          doc.setDrawColor(230, 210, 180);
          doc.line(margin, yPosition, pageWidth - margin, yPosition);
          
          yPosition += 10;
          doc.setFillColor(255, 240, 220);
          doc.rect(margin, yPosition - 8, pageWidth - 2 * margin, 10, 'F');
          
          doc.setFontSize(12);
          doc.setTextColor(124, 77, 26);
          doc.setFont('helvetica', 'bold');
          doc.text('Position', col1, yPosition);
          doc.text('Anzahl', col2, yPosition, { align: 'right' });
          doc.text('Wert pro Stück', col3, yPosition, { align: 'right' });
          doc.text('Gesamtwert', col4, yPosition, { align: 'right' });
          
          yPosition += 5;
          doc.setDrawColor(230, 210, 180);
          doc.line(margin, yPosition, pageWidth - margin, yPosition);
          
          yPosition += 12;
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(50, 50, 50);
          
          sortedBanknotes.forEach(note => {
            if (yPosition > 265) {
              doc.addPage();
              yPosition = 30;
            }
            
            doc.setFontSize(11);
            doc.text(note.label, col1, yPosition);
            doc.text(note.count.toString(), col2, yPosition, { align: 'right' });
            const valuePerItem = (note.totalValue / (note.count > 0 ? note.count : 1)).toFixed(2);
            doc.text(`${valuePerItem} €`, col3, yPosition, { align: 'right' });
            doc.text(`${note.totalValue.toFixed(2)} €`, col4, yPosition, { align: 'right' });
            yPosition += lineHeight + 2;
          });
          
          yPosition += 10;
          doc.setDrawColor(230, 210, 180);
          doc.line(margin, yPosition, pageWidth - margin, yPosition);
          
          yPosition += 10;
          doc.setFontSize(14);
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(124, 77, 26);
          doc.text('GESAMTWERT:', col3, yPosition, { align: 'right' });
          
          doc.setFontSize(16);
          doc.setTextColor(217, 119, 6);
          doc.text(`${totalAmount.toFixed(2)} €`, col4, yPosition, { align: 'right' });
          
          yPosition = 285;
          doc.setDrawColor(230, 210, 180);
          doc.line(margin, yPosition, pageWidth - margin, yPosition);
          
          yPosition += 7;
          doc.setFontSize(10);
          doc.setTextColor(150, 150, 150);
          doc.text('KbI-Rechner • https://julius-scriba.github.io', pageWidth / 2, yPosition, { align: 'center' });
          
          doc.save(`KbI-Rechner_${dateStr}.pdf`);
        } catch (error) {
          console.error('PDF Export Error:', error);
          alert('Fehler beim PDF-Export. Bitte versuchen Sie es später erneut.');
        }
      }, [entries, coins, banknotes, totalAmount]);

      return (
        <div 
          className="min-h-screen bg-gradient-to-br from-amber-50 to-yellow-100 p-4 font-sans relative"
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleTouchEnd}
        >
          <div className="max-w-md mx-auto">
            <header className="text-center mb-8">
              <h1 className="text-4xl font-bold text-amber-800 mb-2">KbI-Rechner</h1>
              <p className="text-lg text-amber-700">Bestimme den Wert deiner Münzen und Scheine</p>
            </header>
            
            <div className="swipe-hint">
              {activeTab === 'coins' ? '→ Swipe für Scheine' : '← Swipe für Münzen'}
            </div>

            <div className="tab-container overflow-hidden rounded-2xl">
              <div className={`flex transition-transform duration-300 ${activeTab === 'coins' ? 'translate-x-0' : '-translate-x-full'}`}>
                {/* Coins Tab */}
                <div className="w-full min-w-full">
                  <div className="bg-white rounded-2xl shadow-xl p-5 space-y-5 mb-6">
                    <div>
                      <label className="block text-sm font-semibold text-amber-800 mb-2">
                        Münzwert auswählen
                      </label>
                      <select
                        value={selectedCoinId}
                        onChange={(e) => setSelectedCoinId(e.target.value)}
                        className="w-full px-4 py-3 border-2 border-amber-200 rounded-lg focus:ring-2 focus:ring-amber-300 focus:border-amber-300 appearance-none bg-white cursor-pointer hover:border-amber-300 transition"
                      >
                        {coins.map((coin) => (
                          <option key={coin.id} value={coin.id}>
                            {coin.label} ({coin.weight}g)
                          </option>
                        ))}
                      </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-semibold text-amber-800 mb-2">
                          Gesamtgewicht (g)
                        </label>
                        <input
                          type="number"
                          step="0.01"
                          value={totalWeight}
                          onChange={(e) => setTotalWeight(e.target.value)}
                          placeholder="z.B. 150"
                          className="w-full px-4 py-3 border-2 border-amber-200 rounded-lg focus:ring-2 focus:ring-amber-300 focus:border-amber-300 transition"
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-amber-800 mb-2">
                          Schalengewicht (g)
                        </label>
                        <input
                          type="number"
                          step="0.01"
                          value={tareWeight}
                          onChange={(e) => setTareWeight(e.target.value)}
                          placeholder="Standard: 34g"
                          className="w-full px-4 py-3 border-2 border-amber-200 rounded-lg focus:ring-2 focus:ring-amber-300 focus:border-amber-300 transition"
                        />
                      </div>
                    </div>

                    <div 
                      className={`p-4 rounded-xl font-semibold text-center transition-all duration-300 ${
                        isValid ? 'bg-amber-50 text-amber-800 text-lg' : 'bg-red-50 text-red-700 text-base'
                      }`}
                    >
                      {resultText}
                    </div>

                    <button
                      onClick={handleAddResult}
                      disabled={!isValid}
                      className={`w-full py-3 rounded-lg font-semibold transition-all active:scale-95 ${
                        isValid 
                          ? 'bg-amber-600 hover:bg-amber-700 text-white shadow-md hover:shadow-lg' 
                          : 'bg-gray-300 text-gray-500 cursor-not-allowed'
                      }`}
                    >
                      ✓ Ergebnis hinzufügen
                    </button>
                  </div>
                </div>
                
                {/* Banknotes Tab */}
                <div className="w-full min-w-full">
                  <div className="bg-white rounded-2xl shadow-xl p-5 space-y-5 mb-6">
                    <div>
                      <label className="block text-sm font-semibold text-amber-800 mb-2">
                        Scheinwert auswählen
                      </label>
                      <select
                        value={selectedBanknoteId}
                        onChange={(e) => setSelectedBanknoteId(e.target.value)}
                        className="w-full px-4 py-3 border-2 border-amber-200 rounded-lg focus:ring-2 focus:ring-amber-300 focus:border-amber-300 appearance-none bg-white cursor-pointer hover:border-amber-300 transition"
                      >
                        {banknotes.map((note) => (
                          <option key={note.id} value={note.id}>
                            {note.label}
                          </option>
                        ))}
                      </select>
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-amber-800 mb-2">
                        Anzahl der Scheine
                      </label>
                      <input
                        type="number"
                        value={numBanknotes}
                        onChange={(e) => setNumBanknotes(e.target.value)}
                        placeholder="z.B. 5"
                        className="w-full px-4 py-3 border-2 border-amber-200 rounded-lg focus:ring-2 focus:ring-amber-300 focus:border-amber-300 transition"
                      />
                    </div>

                    <div 
                      className={`p-4 rounded-xl font-semibold text-center transition-all duration-300 ${
                        banknoteIsValid ? 'bg-amber-50 text-amber-800 text-lg' : 'bg-red-50 text-red-700 text-base'
                      }`}
                    >
                      {banknoteResultText}
                    </div>

                    <button
                      onClick={handleAddBanknote}
                      disabled={!banknoteIsValid}
                      className={`w-full py-3 rounded-lg font-semibold transition-all active:scale-95 ${
                        banknoteIsValid 
                          ? 'bg-amber-600 hover:bg-amber-700 text-white shadow-md hover:shadow-lg' 
                          : 'bg-gray-300 text-gray-500 cursor-not-allowed'
                      }`}
                    >
                      ✓ Ergebnis hinzufügen
                    </button>
                  </div>
                </div>
              </div>
            </div>

            {entries.length > 0 && (
              <div className="bg-white rounded-2xl shadow-xl p-5 mb-6">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-2xl font-bold text-amber-800">Gesammelte Werte</h2>
                  <button 
                    onClick={exportToPDF}
                    className="pdf-button px-4 py-2 rounded-lg text-white font-semibold flex items-center gap-2"
                  >
                    <span>📄</span>
                    <span>PDF</span>
                  </button>
                </div>
                <div className="space-y-2">
                  {entries.map(entry => (
                    <div 
                      key={entry.id} 
                      className="flex justify-between items-center p-3 bg-gradient-to-r from-amber-50 to-yellow-50 rounded-lg border-l-4 border-amber-400"
                    >
                      <div className="flex-1">
                        <div className="font-semibold text-amber-900">{entry.coinLabel}</div>
                        <div className="text-sm text-amber-600">{entry.numCoins} Stück</div>
                      </div>
                      <div className="flex items-center gap-3">
                        <div className="font-bold text-lg text-amber-800 min-w-20 text-right">
                          {entry.totalValue.toFixed(2)} €
                        </div>
                        <button 
                          onClick={() => handleDelete(entry.id)}
                          className="p-2 rounded-full hover:bg-red-100 text-red-500 transition-colors trash-icon"
                          title="Löschen"
                        >
                          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                          </svg>
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-5 pt-5 border-t-2 border-amber-200">
                  <div className="flex justify-between items-center font-bold text-xl">
                    <span className="text-amber-900">Gesamtwert:</span>
                    <span className="text-amber-800 text-2xl">
                      {totalAmount.toFixed(2)} €
                    </span>
                  </div>
                </div>
              </div>
            )}

            <div className="bg-white rounded-2xl shadow-xl p-5 mb-4">
              <h2 className="text-xl font-bold text-amber-800 mb-4">📖 So funktioniert's</h2>
              <ol className="list-decimal list-inside space-y-2 text-amber-700">
                <li className="text-sm">Wähle zwischen <strong>Münzen</strong> (Standard) und <strong>Scheinen</strong> (swipe nach links)</li>
                <li className="text-sm">Bei Münzen: Gib Gesamtgewicht und Schalengewicht (Standard: 34g) ein</li>
                <li className="text-sm">Bei Scheinen: Wähle den Scheinwert und gib die Anzahl ein</li>
                <li className="text-sm">Der Rechner berechnet automatisch den Wert</li>
                <li className="text-sm">Mit „Ergebnis hinzufügen" sammelst du mehrere Berechnungen</li>
                <li className="text-sm">Nach dem Hinzufügen wird das Feld geleert und zur nächst kleineren Einheit gewechselt</li>
